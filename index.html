<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TASKR — Get It Done</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --card:      #1e1e1e;
      --border:    #2a2a2a;
      --accent:    #e8f84b;
      --accent2:   #f84b6e;
      --text:      #f0f0f0;
      --muted:     #666;
      --done-bg:   #1a1f0d;
      --radius:    6px;
      --shadow:    0 4px 24px rgba(0,0,0,0.5);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      background-image:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(232,248,75,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 10% 90%, rgba(248,75,110,0.06) 0%, transparent 70%);
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.6rem, 8vw, 4rem);
      letter-spacing: 0.06em;
      line-height: 1;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .stats {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.8;
    }

    .stats b {
      color: var(--accent);
      font-weight: 700;
    }

    /* ── INPUT ZONE ── */
    .input-zone {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.6rem;
    }

    .task-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1.1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .task-input::placeholder { color: var(--muted); }

    .task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,248,75,0.12);
    }

    .add-btn {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: var(--radius);
      padding: 0.85rem 1.4rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: #f0ff5a;
      box-shadow: 0 0 18px rgba(232,248,75,0.35);
      transform: translateY(-1px);
    }

    .add-btn:active { transform: translateY(0); }

    /* ── FILTERS ── */
    .filters {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 0.35rem 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { color: var(--text); border-color: #444; }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0d;
      font-weight: 700;
    }

    .clear-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid #3a1520;
      color: var(--accent2);
      border-radius: 4px;
      padding: 0.35rem 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover {
      background: var(--accent2);
      color: #fff;
      border-color: var(--accent2);
    }

    /* ── TASK LIST ── */
    .task-list {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    /* ── TASK ITEM ── */
    .task-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.85rem 1rem;
      transition: border-color 0.2s, background 0.2s, transform 0.15s, opacity 0.25s;
      animation: slideIn 0.22s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover {
      border-color: #333;
      transform: translateX(3px);
    }

    .task-item.completed {
      background: var(--done-bg);
      border-color: #2a3310;
    }

    .task-item.removing {
      opacity: 0;
      transform: translateX(30px);
      transition: all 0.25s ease;
    }

    /* Checkbox */
    .task-check {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .task-check:hover { border-color: var(--accent); }

    .task-item.completed .task-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .task-check svg {
      width: 11px; height: 11px;
      stroke: #0d0d0d;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .task-item.completed .task-check svg { opacity: 1; }

    /* Task text */
    .task-text {
      flex: 1;
      font-size: 0.93rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
      transition: color 0.2s;
      word-break: break-word;
    }

    .task-item.completed .task-text {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: #3a3a3a;
    }

    /* Priority tag */
    .task-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 3px;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    .tag-high  { background: rgba(248,75,110,0.15); color: var(--accent2); }
    .tag-mid   { background: rgba(232,248,75,0.12); color: var(--accent); }
    .tag-low   { background: rgba(100,150,255,0.12); color: #7aacff; }

    /* Delete button */
    .del-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      width: 28px; height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .del-btn:hover { background: rgba(248,75,110,0.15); color: var(--accent2); }

    .del-btn svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      fill: none;
    }

    /* ── PRIORITY SELECTOR ── */
    .priority-wrap {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.4rem;
    }

    .priority-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .priority-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.28rem 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .priority-btn[data-p="high"].selected  { background: rgba(248,75,110,0.2); color: var(--accent2); border-color: var(--accent2); }
    .priority-btn[data-p="mid"].selected   { background: rgba(232,248,75,0.15); color: var(--accent); border-color: var(--accent); }
    .priority-btn[data-p="low"].selected   { background: rgba(100,150,255,0.15); color: #7aacff; border-color: #7aacff; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      display: none;
    }

    .empty-state.visible { display: block; }

    .empty-state .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      width: 100%;
      max-width: 640px;
      margin-bottom: 1.5rem;
    }

    .progress-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #aaff00);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }

    .progress-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      margin-bottom: 0.45rem;
      display: flex;
      justify-content: space-between;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 3rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.08em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      body { padding: 1.25rem 0.75rem 3rem; }
      .add-btn { padding: 0.85rem 1rem; font-size: 1rem; }
      .task-item { padding: 0.75rem 0.8rem; gap: 0.7rem; }
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 0.6rem 1.1rem;
      border-radius: var(--radius);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      letter-spacing: 0.04em;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">TASK<span>R</span></div>
  <div class="stats" id="stats-box">
    <div>TOTAL &nbsp;<b id="stat-total">0</b></div>
    <div>DONE &nbsp;&nbsp;<b id="stat-done">0</b></div>
    <div>LEFT &nbsp;&nbsp;<b id="stat-left">0</b></div>
  </div>
</header>

<!-- Input -->
<div class="input-zone">
  <input class="task-input" id="taskInput" type="text" placeholder="What needs to get done?" maxlength="120" autocomplete="off"/>
  <button class="add-btn" id="addBtn">+ ADD</button>
</div>

<!-- Priority -->
<div class="priority-wrap">
  <span class="priority-label">PRIORITY //</span>
  <button class="priority-btn selected" data-p="low">LOW</button>
  <button class="priority-btn" data-p="mid">MID</button>
  <button class="priority-btn" data-p="high">HIGH</button>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-label">
    <span>PROGRESS</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
</div>

<!-- Filters -->
<div class="filters">
  <button class="filter-btn active" data-f="all">ALL</button>
  <button class="filter-btn" data-f="active">ACTIVE</button>
  <button class="filter-btn" data-f="done">DONE</button>
  <button class="clear-btn" id="clearDoneBtn">CLEAR DONE</button>
</div>

<!-- Task List -->
<div class="task-list" id="taskList"></div>

<!-- Empty State -->
<div class="empty-state" id="emptyState">
  <div class="empty-icon">◻</div>
  <p>NO TASKS HERE.<br/>ADD ONE ABOVE.</p>
</div>

<footer>TASKR © 2025 — ALL DATA STORED LOCALLY</footer>
<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  let tasks = JSON.parse(localStorage.getItem('taskr_tasks') || '[]');
  let filter = 'all';
  let priority = 'low';

  // ── ELEMENTS ──
  const taskInput   = document.getElementById('taskInput');
  const addBtn      = document.getElementById('addBtn');
  const taskList    = document.getElementById('taskList');
  const emptyState  = document.getElementById('emptyState');
  const progressFill= document.getElementById('progressFill');
  const progressPct = document.getElementById('progress-pct');
  const statTotal   = document.getElementById('stat-total');
  const statDone    = document.getElementById('stat-done');
  const statLeft    = document.getElementById('stat-left');
  const clearDoneBtn= document.getElementById('clearDoneBtn');
  const toastEl     = document.getElementById('toast');

  // ── TOAST ──
  let toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  // ── SAVE ──
  function save() {
    localStorage.setItem('taskr_tasks', JSON.stringify(tasks));
  }

  // ── ADD TASK ──
  function addTask() {
    const text = taskInput.value.trim();
    if (!text) {
      taskInput.focus();
      taskInput.style.borderColor = 'var(--accent2)';
      setTimeout(() => taskInput.style.borderColor = '', 700);
      return;
    }
    const task = {
      id: Date.now(),
      text,
      done: false,
      priority,
      createdAt: new Date().toISOString()
    };
    tasks.unshift(task);
    save();
    taskInput.value = '';
    taskInput.focus();
    render();
    showToast('✓ TASK ADDED');
  }

  // ── DELETE TASK ──
  function deleteTask(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
      }, 250);
    }
  }

  // ── TOGGLE TASK ──
  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    save();
    render();
    const t = tasks.find(t => t.id === id);
    showToast(t.done ? '● MARKED DONE' : '○ REOPENED');
  }

  // ── RENDER ──
  function render() {
    const visible = tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done')   return t.done;
      return true;
    });

    taskList.innerHTML = '';

    visible.forEach(task => {
      const item = document.createElement('div');
      item.className = 'task-item' + (task.done ? ' completed' : '');
      item.dataset.id = task.id;

      const tagClass = { high: 'tag-high', mid: 'tag-mid', low: 'tag-low' }[task.priority] || 'tag-low';
      const tagLabel = task.priority.toUpperCase();

      item.innerHTML = `
        <div class="task-check" title="Toggle complete">
          <svg viewBox="0 0 12 9"><polyline points="1,5 4,8 11,1"/></svg>
        </div>
        <span class="task-text">${escHtml(task.text)}</span>
        <span class="task-tag ${tagClass}">${tagLabel}</span>
        <button class="del-btn" title="Delete task">
          <svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
        </button>
      `;

      item.querySelector('.task-check').addEventListener('click', () => toggleTask(task.id));
      item.querySelector('.task-text').addEventListener('click', () => toggleTask(task.id));
      item.querySelector('.del-btn').addEventListener('click', () => deleteTask(task.id));

      taskList.appendChild(item);
    });

    // Empty state
    emptyState.classList.toggle('visible', visible.length === 0);

    // Stats
    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;
    const left  = total - done;
    statTotal.textContent = total;
    statDone.textContent  = done;
    statLeft.textContent  = left;

    // Progress
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    progressFill.style.width = pct + '%';
    progressPct.textContent  = pct + '%';
  }

  // ── HTML ESCAPE ──
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── EVENTS: ADD ──
  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  // ── EVENTS: FILTERS ──
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.f;
      render();
    });
  });

  // ── EVENTS: PRIORITY ──
  document.querySelectorAll('.priority-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      priority = btn.dataset.p;
    });
  });

  // ── EVENTS: CLEAR DONE ──
  clearDoneBtn.addEventListener('click', () => {
    const count = tasks.filter(t => t.done).length;
    if (!count) { showToast('NOTHING TO CLEAR'); return; }
    tasks = tasks.filter(t => !t.done);
    save();
    render();
    showToast(`✕ ${count} TASK${count > 1 ? 'S' : ''} CLEARED`);
  });

  // ── INIT ──
  render();
</script>
</body>
</html>
